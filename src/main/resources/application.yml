spring:
  application.name: cinepick_BE
  datasource:
    url: jdbc:mysql://52.78.3.251:3306/cinepick_rf
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet.multipart:
    max-file-size: 5MB
    max-request-size: 5MB

file:
  upload-dir: ./uploads


logging.level.org.hibernate:
  SQL: DEBUG
  type.descriptor.sql: TRACE

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

tmdb:
  token: ${TMDB_TOKEN}